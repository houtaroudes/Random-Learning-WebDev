<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:480px}
.demo-title{color:#fff;text-align:center;margin-bottom:32px;font-size:1.8rem;font-weight:300}
.demo-title span{color:#e94560;font-weight:600}
.generator-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:32px;backdrop-filter:blur(12px)}
.password-display{display:flex;align-items:center;gap:10px;margin-bottom:24px;background:rgba(0,0,0,0.2);border:2px solid rgba(255,255,255,0.06);border-radius:14px;padding:4px 4px 4px 16px}
.password-display .pw-text{flex:1;color:#fff;font-family:'Courier New',monospace;font-size:1.1rem;font-weight:600;padding:14px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.04em}
.password-display .pw-strength{font-size:.7rem;padding:4px 10px;border-radius:6px;font-weight:600;text-transform:uppercase}
.copy-btn{background:rgba(255,255,255,0.06);border:none;color:#fff;width:42px;height:42px;border-radius:10px;cursor:pointer;font-size:1.2rem;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.copy-btn:hover{background:rgba(233,69,96,0.15);transform:scale(1.05)}
.copy-btn.copied{background:rgba(74,222,128,0.15)}
.options{display:flex;flex-direction:column;gap:16px}
.option-row{display:flex;align-items:center;justify-content:space-between}
.option-label{color:rgba(255,255,255,0.6);font-size:.9rem}
.length-control{display:flex;align-items:center;gap:12px}
.length-control input[type="range"]{width:140px;accent-color:#e94560;cursor:pointer}
.length-value{color:#fff;font-weight:600;font-size:1.1rem;min-width:28px;text-align:center}
.toggle-group{display:flex;flex-wrap:wrap;gap:10px}
.toggle-btn{padding:8px 16px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);border-radius:10px;color:rgba(255,255,255,0.4);cursor:pointer;transition:all .2s;font-size:.85rem;font-family:inherit}
.toggle-btn.active{border-color:#e94560;background:rgba(233,69,96,0.1);color:#e94560}
.regenerate-btn{width:100%;margin-top:20px;padding:14px;background:#e94560;border:none;border-radius:12px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.regenerate-btn:hover{background:#ff6b81;transform:translateY(-1px);box-shadow:0 4px 16px rgba(233,69,96,0.3)}
</style>
</head>
<body>
<div class="container">
<h1 class="demo-title">🔑 <span>Password</span> Generator</h1>
<div class="generator-card">
<div class="password-display">
<span class="pw-text" id="passwordText">P@ssw0rd!</span>
<span class="pw-strength" id="strengthBadge">Strong</span>
<button class="copy-btn" id="copyBtn">📋</button>
</div>
<div class="options">
<div class="option-row">
<span class="option-label">Length</span>
<div class="length-control">
<input type="range" id="lengthSlider" min="6" max="40" value="16">
<span class="length-value" id="lengthValue">16</span>
</div>
</div>
<div class="option-row">
<span class="option-label">Include</span>
<div class="toggle-group">
<button class="toggle-btn active" data-type="upper">A-Z</button>
<button class="toggle-btn active" data-type="lower">a-z</button>
<button class="toggle-btn active" data-type="numbers">0-9</button>
<button class="toggle-btn active" data-type="symbols">!#$</button>
</div>
</div>
</div>
<button class="regenerate-btn" id="generateBtn">🔄 Generate New Password</button>
</div>
</div>
<script>
const passwordText = document.getElementById('passwordText');
const strengthBadge = document.getElementById('strengthBadge');
const copyBtn = document.getElementById('copyBtn');
const lengthSlider = document.getElementById('lengthSlider');
const lengthValue = document.getElementById('lengthValue');
const generateBtn = document.getElementById('generateBtn');
const charset = {
upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
lower: 'abcdefghijklmnopqrstuvwxyz',
numbers: '0123456789',
symbols: '!@#$%^&*()-_=+[]{}|;:,.<>?/~`'
};
function getActiveTypes() {
return Array.from(document.querySelectorAll('.toggle-btn.active')).map(b => b.dataset.type);
}
function generatePassword() {
const length = parseInt(lengthSlider.value);
const types = getActiveTypes();
if (types.length === 0) return 'Select options';
let chars = types.map(t => charset[t]).join('');
let password = '';
for (let i = 0; i < length; i++) {
password += chars[Math.floor(Math.random() * chars.length)];
}
let guaranteed = types.map(t => charset[t][Math.floor(Math.random() * charset[t].length)]).join('');
password = password.substring(0, length - guaranteed.length) + guaranteed;
password = password.split('').sort(() => Math.random() - 0.5).join('');
return password;
}
function updateStrength(pw) {
const score = Math.min(pw.length * 4 + (/\d/.test(pw) ? 10 : 0) + (/[!@#$%^&*]/.test(pw) ? 10 : 0), 100);
if (score < 30) { strengthBadge.textContent = 'Weak'; strengthBadge.style.color = '#ff6b6b'; }
else if (score < 60) { strengthBadge.textContent = 'Fair'; strengthBadge.style.color = '#fbbf24'; }
else if (score < 80) { strengthBadge.textContent = 'Good'; strengthBadge.style.color = '#4ade80'; }
else { strengthBadge.textContent = 'Strong'; strengthBadge.style.color = '#4ade80'; }
}
function regenerate() {
const pw = generatePassword();
passwordText.textContent = pw;
updateStrength(pw);
copyBtn.textContent = '📋';
copyBtn.classList.remove('copied');
}
lengthSlider.addEventListener('input', () => { lengthValue.textContent = lengthSlider.value; regenerate(); });
document.querySelectorAll('.toggle-btn').forEach(btn => btn.addEventListener('click', () => {
btn.classList.toggle('active');
if (document.querySelectorAll('.toggle-btn.active').length === 0) btn.classList.add('active');
regenerate();
}));
generateBtn.addEventListener('click', regenerate);
copyBtn.addEventListener('click', () => {
navigator.clipboard.writeText(passwordText.textContent).then(() => {
copyBtn.textContent = '✅'; copyBtn.classList.add('copied');
setTimeout(() => { copyBtn.textContent = '📋'; copyBtn.classList.remove('copied'); }, 1500);
});
});
regenerate();
</script>
</body>
</html>
