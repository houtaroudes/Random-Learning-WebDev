<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Progress Bar</title>
    <link rel="stylesheet" href="Animated Progress bar.css">
</head>
<body>
    <div class="container">
        <div class="skill">
            <div class="info">
                <span>HTML</span>
                <span>95%</span>
            </div>
            <div class="bar">
                <div class="progress" style="width: 95%;"></div>
            </div>
        </div>

        <div class="skill">
            <div class="info">
                <span>CSS</span>
                <span>90%</span>
            </div>
            <div class="bar">
                <div class="progress" style="width: 90%;"></div>
            </div>
        </div>

        <div class="skill">
            <div class="info">
                <span>JavaScript</span>
                <span>80%</span>
            </div>
            <div class="bar">
                <div class="progress" style="width: 80%;"></div>
            </div>
        </div>
    </div>
</body>
</html>
