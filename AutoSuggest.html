<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Suggest</title>
    <link rel="stylesheet" href="AutoSuggest.css">
</head>
<body>
    <label for="" class="country-choice">Pumili ka na lang otids: </label>
    <input type="text" name="country-choice" id="country-choice"
    list="countries" placeholder="Enter Your Country">

    <datalist id="countries">
        <option value="Tropa mo"></option>
        <option value="Bading"></option>
        <option value="Resort Tambay?"></option>
        <option value="GMA CUBAO"></option>
        <option value="LRT DAW PERO BABA SA GMA?"></option>
    </datalist>
</body>
</html>
