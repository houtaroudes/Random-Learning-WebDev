<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="Password Generator.css">

</head>
<body>
    <div class="container">
        <p id="password"></p>
        <button class="btn primary" 
        type="button"
         onclick="password.innerText = Array.from({length: 8}, 
            () => String.fromCharCode(Math.floor(Math.random() * 94) + 33)).join('')"
        >Generate Password</button>

    </div>
</body>
</html>
